<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GiaoHang Pro — Preview Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite alternate;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #6c63ff, #3b82f6);
            top: -100px; left: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #f472b6, #a855f7);
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.1); }
        }

        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 2.5rem 2.25rem;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.12);
            animation: slideUp 0.5s ease-out both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6c63ff, #3b82f6);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(108,99,255,0.45);
        }
        .brand-logo i { font-size: 1.7rem; color: #fff; }

        .brand-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }
        .brand-subtitle {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.55);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-label-custom {
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 0.4rem;
            display: block;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.2s;
            z-index: 5;
        }
        .form-control-custom {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 0.75rem 1rem 0.75rem 2.65rem;
            color: #fff;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            outline: none;
        }
        .form-control-custom::placeholder { color: rgba(255,255,255,0.3); }
        .form-control-custom:focus {
            background: rgba(255,255,255,0.13);
            border-color: #6c63ff;
            box-shadow: 0 0 0 4px rgba(108,99,255,0.2);
            color: #fff;
        }
        .input-group-custom:focus-within .input-icon { color: #a78bfa; }

        .toggle-pass {
            position: absolute;
            right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: rgba(255,255,255,0.35);
            cursor: pointer; font-size: 1rem;
            transition: color 0.2s;
            z-index: 5;
        }
        .toggle-pass:hover { color: #a78bfa; }

        .custom-check {
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer;
        }
        .custom-check input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: #6c63ff;
            cursor: pointer;
        }
        .custom-check span {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            user-select: none;
        }

        .btn-auth {
            width: 100%;
            padding: 0.82rem;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            color: #fff;
            background: linear-gradient(135deg, #6c63ff 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(108,99,255,0.4);
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(108,99,255,0.55);
        }
        .btn-auth:active { transform: translateY(0); }

        .forgot-link {
            font-size: 0.82rem;
            color: #a78bfa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: #c4b5fd; }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.87rem;
            color: rgba(255,255,255,0.5);
        }
        .auth-footer a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-footer a:hover { color: #c4b5fd; }

        .preview-badge {
            position: fixed;
            top: 16px; right: 16px;
            background: rgba(108,99,255,0.9);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            z-index: 9999;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
        }
        .page-switch {
            position: fixed;
            top: 16px; left: 16px;
            display: flex; gap: 8px;
            z-index: 9999;
        }
        .page-switch a {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .page-switch a:hover,
        .page-switch a.active { background: rgba(108,99,255,0.6); }
    </style>
</head>
<body>

    <div class="preview-badge">🎨 Preview Mode</div>
    <div class="page-switch">
        <a href="preview-login.html" class="active">Login</a>
        <a href="preview-register.html">Register</a>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Brand -->
            <div class="brand-logo">
                <i class="bi bi-truck"></i>
            </div>
            <div class="brand-title">GiaoHang Pro</div>
            <div class="brand-subtitle">Quản lý lộ trình giao hàng thông minh</div>

            <!-- Form -->
            <form>

                <!-- Email -->
                <div class="mb-1">
                    <label class="form-label-custom" for="email">Email</label>
                    <div class="input-group-custom">
                        <i class="bi bi-envelope input-icon"></i>
                        <input
                            id="email" type="email"
                            class="form-control-custom"
                            placeholder="admin@giaohang.com"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-1 mt-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label-custom" for="password" style="margin-bottom:0">Mật khẩu</label>
                        <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    </div>
                    <div class="input-group-custom">
                        <i class="bi bi-lock input-icon"></i>
                        <input
                            id="password" type="password"
                            class="form-control-custom"
                            placeholder="••••••••"
                            style="padding-right: 2.8rem;"
                        >
                        <button type="button" class="toggle-pass" id="togglePassBtn">
                            <i class="bi bi-eye" id="togglePassIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember -->
                <div class="mt-3">
                    <label class="custom-check">
                        <input type="checkbox">
                        <span>Ghi nhớ đăng nhập</span>
                    </label>
                </div>

                <!-- Submit -->
                <button type="button" class="btn-auth mt-4" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                Chưa có tài khoản?
                <a href="preview-register.html">Đăng ký ngay</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const btn   = document.getElementById('togglePassBtn');
        const icon  = document.getElementById('togglePassIcon');
        const input = document.getElementById('password');
        btn.addEventListener('click', function () {
            const isPass = input.type === 'password';
            input.type   = isPass ? 'text' : 'password';
            icon.className = isPass ? 'bi bi-eye-slash' : 'bi bi-eye';
        });

        const loginBtn = document.getElementById('loginBtn');
        loginBtn.addEventListener('click', function () {
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xác thực...';
            setTimeout(() => {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
            }, 2000);
        });
    </script>
</body>
</html>
